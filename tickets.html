<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Checkout | Festival Moonlight</title>
    <link rel="stylesheet" href="style.css"> 
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        /* Specific styles for the ticket form layout */
        .checkout-container {
            max-width: 500px;
            margin: 120px auto 50px auto;
            background: #1e293b;
            padding: 40px;
            border-radius: 20px;
            border: 1px solid #334155;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .checkout-container h2 {
            color: #a78bfa;
            margin-bottom: 20px;
            text-align: center;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #cbd5e1;
            font-size: 0.9rem;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            color: #fff;
            font-family: 'Poppins', sans-serif;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #a78bfa;
        }
        .btn-submit {
            width: 100%;
            padding: 14px;
            background: #7c3aed;
            border: none;
            color: white;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-submit:hover {
            background: #a78bfa;
            box-shadow: 0 0 15px #a78bfa;
        }
        .back-home {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #60a5fa;
            text-decoration: none;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">Moonlight</div>
        <ul class="nav-links">
            <li><a href="index.html">← Back to Festival</a></li>
        </ul>
    </nav>

    <div class="checkout-container">
        <h2>Ticket Order Form</h2>
        <form action="#" method="POST" onsubmit="alert('Thank you for your order! Your ticket info will be sent to your email.');">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" required placeholder="Enter your full name">
            </div>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" required placeholder="name@example.com">
            </div>
            <div class="form-group">
                <label for="ticket-type">Ticket Category</label>
                <select id="ticket-type">
                    <option value="ga">General Admission - Rp 750.000</option>
                    <option value="vip">VIP Moonlight - Rp 2.500.000</option>
                    <option value="vvip">Celestial VVIP - Rp 5.000.000</option>
                </select>
            </div>
            <div class="form-group">
                <label for="quantity">Quantity</label>
                <input type="number" id="quantity" min="1" max="5" value="1">
            </div>
            <button type="submit" class="btn-submit">Proceed to Payment</button>
        </form>
        <a href="index.html" class="back-home">Cancel and return</a>
    </div>

</body>
</html>
